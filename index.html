<!DOCTYPE html>
<html>
<head>
  <title>Fresh & Clean Laundry POS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top">
  <h1>🧺 Fresh & Clean Laundry</h1>
</div>

<div class="container">

  <!-- LEFT: ITEMS -->
  <div class="left" id="items"></div>

  <!-- RIGHT: BILL -->
  <div class="right">

    <h2>🧾 Bill</h2>

    <input id="name" placeholder="Customer Name">
    <input id="phone" placeholder="Phone">
    <input id="address" placeholder="Address">

    <p id="date"></p>
    <p id="delivery"></p>

    <div id="bill"></div>

    <h3 id="total">Total: 0</h3>

    <button onclick="saveBill()">💾 Save Bill</button>
    <button onclick="printBill()">🖨 Print</button>

    <h3>📂 Saved Bills</h3>
    <div id="history"></div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
