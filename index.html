<!DOCTYPE html>
<html>
<head>
  <title>Fresh & Clean Laundry</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Fresh & Clean Laundry</h1>
  <p>Fast • Clean • Reliable Service</p>
</header>

<section class="card">
  <h2>Our Services</h2>

  <div class="service">
    <span>Wash</span>
    <span contenteditable="true">1.000 BD</span>
  </div>

  <div class="service">
    <span>Iron</span>
    <span contenteditable="true">0.500 BD</span>
  </div>

  <div class="service">
    <span>Dry Clean</span>
    <span contenteditable="true">2.000 BD</span>
  </div>
</section>

<section class="card">
  <h2>Create Bill</h2>

  <input type="text" id="customer" placeholder="Customer Name">
  <input type="number" id="amount" placeholder="Total Amount">

  <button onclick="printBill()">Print Bill</button>
</section>

<footer>
  <p>© 2026 Fresh & Clean Laundry</p>
</footer>

<script src="script.js"></script>
</body>
</html>
