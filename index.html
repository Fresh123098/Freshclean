<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fresh & Clean Laundry</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#f4f6f8;color:#333}
header{background:#0a7cff;color:#fff;padding:20px;text-align:center}
header h1{font-size:28px}
.container{padding:20px;max-width:1100px;margin:auto}
.services{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-top:30px}
.card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 5px 15px rgba(0,0,0,0.08);text-align:center}
.card h3{margin-bottom:10px;color:#0a7cff}
.price{font-size:22px;font-weight:600;margin:10px 0}
button{background:#0a7cff;color:white;border:none;padding:10px 15px;border-radius:8px;cursor:pointer}
button:hover{background:#095ec7}
.bill-section{margin-top:40px;background:#fff;padding:20px;border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,0.08)}
table{width:100%;border-collapse:collapse;margin-top:15px}
th,td{padding:10px;border-bottom:1px solid #ddd;text-align:center}
.total{font-weight:600;font-size:18px;text-align:right;margin-top:10px}
footer{text-align:center;margin-top:40px;padding:20px;font-size:14px;color:#777}
</style>
</head>

<body>

<header>
  <h1>Fresh & Clean Laundry</h1>
  <p>Professional Wash | Iron | Dry Clean Services</p>
</header>

<div class="container">

  <div class="services">
    <div class="card">
      <h3>Wash</h3>
      <div class="price">2 BHD / cloth</div>
      <button onclick="addToBill('Wash',2)">Add</button>
    </div>

    <div class="card">
      <h3>Iron</h3>
      <div class="price">1 BHD / cloth</div>
      <button onclick="addToBill('Iron',1)">Add</button>
    </div>

    <div class="card">
      <h3>Dry Clean</h3>
      <div class="price">3 BHD / cloth</div>
      <button onclick="addToBill('Dry Clean',3)">Add</button>
    </div>
  </div>

  <div class="bill-section" id="bill">
    <h2>Customer Bill</h2>
    <table id="billTable">
      <tr>
        <th>Service</th>
        <th>Price</th>
      </tr>
    </table>
    <div class="total" id="total">Total: 0 BHD</div>
    <button onclick="downloadBill()">Download Bill PDF</button>
  </div>

</div>

<footer>
  © 2026 Fresh & Clean Laundry. All rights reserved.
</footer>

<script>
let total = 0;

function addToBill(service, price){
  let table = document.getElementById("billTable");
  let row = table.insertRow();
  row.insertCell(0).innerText = service;
  row.insertCell(1).innerText = price + " BHD";
  total += price;
  document.getElementById("total").innerText = "Total: " + total + " BHD";
}

function downloadBill(){
  const bill = document.getElementById("bill");
  const opt = {
    margin: 0.5,
    filename: 'Fresh_Clean_Bill.pdf',
    image: { type: 'jpeg', quality: 1 },
    html2canvas: { scale: 2 },
    jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
  };
  html2pdf().set(opt).from(bill).save();
}
</script>

</body>
</html>
