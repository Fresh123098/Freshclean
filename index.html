<!DOCTYPE html>
<html>
<head>
  <title>Fresh & Clean Laundry POS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="header">
    <h1>🧺 Fresh & Clean Laundry</h1>
    <p>Professional Billing System</p>
  </div>

  <div class="customer-box">
    <input id="cname" placeholder="Customer Name">
    <input id="cphone" placeholder="Phone Number">
  </div>

  <table>
    <thead>
      <tr>
        <th>Item</th>
        <th>Wash & Iron</th>
        <th>Iron Only</th>
        <th>Dry Clean</th>
        <th>Qty</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody id="items"></tbody>
  </table>

  <h2 id="summary"></h2>

  <button onclick="printBill()">🖨 Print Bill</button>

</div>

<script src="script.js"></script>
</body>
</html>
